# Improved using Gemini in response to improving Docker Compose.

version: '3.8'

services:
  # Container 1: The PostgreSQL Database (Restored to your exact settings)
  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=sngproject
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=eventmanager_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Container 2: Your Next.js App
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://sngproject:mypassword@db:5432/eventmanager_db?schema=public
      - JWT_SECRET=supersecret123
    depends_on:
      - db
    restart: on-failure

# Your Restored Volume
volumes:
  postgres_data: